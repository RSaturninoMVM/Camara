<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0f1a"/>
  <meta name="description" content="SensorCam Explorer - Càmera i sensors"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SensorCam"/>

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet"
  />

  <title>SensorCam Explorer</title>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-content">
      <div class="logo-icon">📡</div>
      <h1>SensorCam</h1>
      <p>Explorer</p>
      <div class="loader-bar">
        <div class="loader-fill"></div>
      </div>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <div id="app" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <span class="app-icon">📡</span>
        <span class="app-title">SensorCam</span>
      </div>
      <div class="header-right">
        <div id="sensor-status" class="status-badge offline">
          <span class="status-dot"></span>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="app-main">

      <!-- TAB: CÀMERA -->
      <section id="tab-camera" class="tab-content active">
        <div class="camera-wrapper">
          <div class="camera-container" id="cameraContainer">
            <video id="videoFeed" autoplay playsinline muted></video>
            <canvas id="effectCanvas"></canvas>

            <div class="camera-overlay">
              <div class="corner top-left"></div>
              <div class="corner top-right"></div>
              <div class="corner bottom-left"></div>
              <div class="corner bottom-right"></div>
            </div>

            <div class="motion-hud">
              <div class="hud-item">
                <span class="hud-label">X</span>
                <div class="hud-bar"><div class="hud-fill" id="hudX"></div></div>
              </div>
              <div class="hud-item">
                <span class="hud-label">Y</span>
                <div class="hud-bar"><div class="hud-fill" id="hudY"></div></div>
              </div>
            </div>

            <div class="flash-overlay" id="flashOverlay"></div>

            <div class="no-camera" id="noCamera">
              <span>📷</span>
              <p>Activa la càmera</p>
              <small>Clica el botó per començar</small>
            </div>
          </div>

          <div class="camera-controls">
            <button class="ctrl-btn secondary" id="switchCamera" title="Canviar càmera">🔄</button>
            <button class="ctrl-btn primary"   id="captureBtn"   title="Fer foto">
              <div class="capture-ring">
                <div class="capture-circle"></div>
              </div>
            </button>
            <button class="ctrl-btn secondary" id="effectBtn"    title="Efectes">✨</button>
          </div>

          <div class="effect-selector" id="effectSelector">
            <button class="effect-opt active" data-effect="normal">Normal</button>
            <button class="effect-opt" data-effect="tilt-blur">Tilt</button>
            <button class="effect-opt" data-effect="shake">Shake</button>
            <button class="effect-opt" data-effect="neon">Neon</button>
          </div>
        </div>
      </section>

      <!-- TAB: SENSORS -->
      <section id="tab-sensors" class="tab-content">
        <div class="sensors-wrapper">
          <div class="sensor-card">
            <div class="card-header">
              <span class="card-icon">📍</span>
              <div>
                <h3>Localització</h3>
                <small>Ubicació del teu cotxe</small>
              </div>
            </div>
            <div class="compass-container">
              <div class="location-data">
                <div class="location-item">
                  <span class="location-label">Latitud: </span>
                  <span class="location-val" id="oLatitud"></span>
                </div>
                <div class="location-item">
                  <span class="location-label">Longitud: </span>
                  <span class="location-val" id="oLongitud"></span>
                </div>
              </div>
            </div>
          </div>

          <button class="activate-btn" id="activateBtn">
            <span class="btn-icon">💾</span> Guardar Ubicació
          </button>

          <div class="shake-alert hidden" id="shakeAlert">
            <span>💥</span> Sacsejada detectada!
          </div>

        </div>
      </section>

      <!-- TAB: GALERIA -->
      <section id="tab-gallery" class="tab-content">
        <div class="gallery-wrapper">
          <div class="gallery-header">
            <h2>Les meves fotos</h2>
            <button class="clear-btn" id="clearGallery">🗑️ Netejar</button>
          </div>
          <div class="gallery-grid" id="galleryGrid">
            <div class="gallery-empty" id="galleryEmpty">
              <span>📭</span>
              <p>Encara no hi ha fotos</p>
              <small>Fes una foto amb la càmera!</small>
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="camera">
        <span class="tab-icon">📸</span>
        <span>Càmera</span>
      </button>
      <button class="tab-btn" data-tab="sensors">
        <span class="tab-icon">🗺️</span>
        <span>Ubicació</span>
      </button>
      <button class="tab-btn" data-tab="gallery">
        <span class="tab-icon">🖼️</span>
        <span>Galeria</span>
      </button>
    </nav>

  </div>

  <!-- PHOTO MODAL -->
  <div class="photo-modal hidden" id="photoModal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <img id="modalImage" src="" alt="Foto capturada"/>
      <div class="modal-info" id="modalInfo"></div>
      <div class="modal-actions">
        <button class="modal-btn download" id="downloadBtn">⬇️ Descarregar</button>
        <button class="modal-btn close"    id="closeModal">✕ Tancar</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Entry point de Vite -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
